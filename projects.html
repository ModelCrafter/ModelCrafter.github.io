<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Youssef Khaled</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-color: #0a0a1a;
            --text-color: #e0e0e8;
            --glow-soft: rgba(100, 150, 255, 0.4);
            --nav-bg: rgba(10, 10, 30, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            background: #000000;
            color: var(--text-color);
            font-family: 'VT323', monospace;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #space-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .star-bg {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.6;
            box-shadow: 0 0 6px rgba(200, 200, 255, 0.4);
            animation: twinkle 2.5s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        .asteroid {
            position: absolute;
            border-radius: 50%;
            opacity: 0.7;
            box-shadow: 0 0 8px rgba(180, 180, 200, 0.4);
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(100, 150, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.15);
        }

        .nav-container {
            display: flex;
            gap: 4rem;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid rgba(150, 180, 255, 0.5);
            color: #a8c5ff;
            padding: 0.7rem 1.4rem;
            font-size: 1.2rem;
            font-family: 'VT323', monospace;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(100, 150, 255, 0.2);
            text-shadow: 0 0 5px rgba(100, 150, 255, 0.3);
        }

        .nav-btn:hover {
            transform: scale(1.08);
            border-color: rgba(150, 180, 255, 0.8);
            color: #d0e0ff;
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.4);
            text-shadow: 0 0 8px rgba(100, 150, 255, 0.6);
        }

        /* CONTENT */
        .content {
            position: relative;
            z-index: 10;
            padding-top: 100px;
            padding-bottom: 50px;
        }

        .page-title {
            text-align: center;
            font-size: 3rem;
            color: #e0e0e8;
            text-shadow: 0 0 30px rgba(100, 150, 255, 0.4);
            letter-spacing: 6px;
            margin: 2rem 0 3rem;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .project-card {
            background: rgba(15, 15, 35, 0.6);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 4px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .project-card:hover {
            border-color: rgba(100, 150, 255, 0.8);
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.3);
            transform: translateY(-5px);
        }

        .project-id {
            font-size: 0.9rem;
            color: #ffaa66;
            text-shadow: 0 0 5px rgba(255, 170, 102, 0.4);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .project-title {
            font-size: 1.5rem;
            color: #e0e0e8;
            text-shadow: 0 0 15px rgba(100, 150, 255, 0.3);
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .project-description {
            font-size: 1rem;
            color: #a8c5ff;
            text-shadow: 0 0 10px rgba(100, 150, 255, 0.2);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="space-container"></div>

    <header class="navbar">
        <nav class="nav-container">
            <button class="nav-btn" data-nav="signal">SIGNAL</button>
            <button class="nav-btn" data-nav="projects">PROJECTS</button>
            <button class="nav-btn" data-nav="datasets">DATASETS</button>
            <button class="nav-btn" data-nav="init">INIT</button>
        </nav>
    </header>

    <div class="content">
        <h1 class="page-title">PROJECTS</h1>
        <div class="projects-grid" id="projectsContainer"></div>
    </div>

    <script src="data.js"></script>
    <script>
        const spaceContainer = document.getElementById('space-container');
        const projectsContainer = document.getElementById('projectsContainer');
        const bgStarCount = 200;
        const navBtns = document.querySelectorAll('.nav-btn');

        function createBgStars() {
            for (let i = 0; i < bgStarCount; i++) {
                const star = document.createElement('div');
                star.className = 'star-bg';
                const pos = { x: Math.random() * 100, y: Math.random() * 100 };
                const size = Math.random() * 1.5 + 0.3;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = pos.x + '%';
                star.style.top = pos.y + '%';
                star.style.animationDelay = (Math.random() * 2.5) + 's';
                spaceContainer.appendChild(star);
            }
        }

        function createAsteroids() {
            const asteroidCount = 6;
            for (let i = 0; i < asteroidCount; i++) {
                const asteroid = document.createElement('div');
                asteroid.className = 'asteroid';
                const size = Math.random() * 6 + 2;
                asteroid.style.width = size + 'px';
                asteroid.style.height = size + 'px';
                asteroid.style.left = Math.random() * 100 + '%';
                asteroid.style.top = Math.random() * 100 + '%';
                asteroid.style.background = '#b4b4c8';
                spaceContainer.appendChild(asteroid);
            }
        }

        function renderProjects() {
            projectsContainer.innerHTML = '';
            projectsData.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <div class="project-id">PROJECT_0${project.id}</div>
                    <h3 class="project-title">${project.title}</h3>
                    <p class="project-description">${project.description}</p>
                `;
                card.addEventListener('click', function() {
                    window.location.href = project.link;
                });
                projectsContainer.appendChild(card);
            });

        }

        navBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                const nav = btn.getAttribute('data-nav');
                const pages = {
                    'signal': 'signal.html',
                    'projects': 'projects.html',
                    'datasets': 'datasets.html',
                    'init': 'index.html'
                };
                if (pages[nav]) {
                    window.location.href = pages[nav];
                }
            });
        });

        createBgStars();
        createAsteroids();
        renderProjects();
    </script>
</body>
</html>
