<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Init | Youssef Khaled</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-color: #0a0a1a;
            --text-color: #e0e0e8;
            --glow-soft: rgba(100, 150, 255, 0.4);
            --nav-bg: rgba(10, 10, 30, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            background: #000000;
            color: var(--text-color);
            font-family: 'VT323', monospace;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #space-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .star-bg {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.6;
            box-shadow: 0 0 6px rgba(200, 200, 255, 0.4);
            animation: twinkle 2.5s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        .asteroid {
            position: absolute;
            border-radius: 50%;
            opacity: 0.7;
            box-shadow: 0 0 8px rgba(180, 180, 200, 0.4);
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(100, 150, 255, 0.3);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 15px 20px;
            z-index: 999;
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.15);
        }

        .nav-btn {
            background: transparent;
            border: 1px solid rgba(150, 180, 255, 0.5);
            color: #a8c5ff;
            padding: 0.7rem 1.4rem;
            font-size: 1rem;
            font-family: 'VT323', monospace;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(100, 150, 255, 0.2);
            text-shadow: 0 0 5px rgba(100, 150, 255, 0.3);
        }

        .nav-btn:hover {
            transform: scale(1.08);
            border-color: rgba(150, 180, 255, 0.8);
            color: #d0e0ff;
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.4);
            text-shadow: 0 0 8px rgba(100, 150, 255, 0.6);
        }

        /* CONTENT */
        .content {
            position: relative;
            z-index: 10;
            padding-top: 100px;
            padding-bottom: 50px;
        }

        .page-title {
            text-align: center;
            font-size: 3rem;
            color: #e0e0e8;
            text-shadow: 0 0 30px rgba(100, 150, 255, 0.4);
            letter-spacing: 6px;
            margin: 2rem 0 3rem;
        }

        .init-info {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            text-align: center;
        }

        .init-info p {
            font-size: 1.3rem;
            color: #b8c8e8;
            text-shadow: 0 0 15px rgba(100, 150, 255, 0.2);
            line-height: 1.8;
            margin-bottom: 20px;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .navbar {
                padding: 10px 15px;
            }

            .nav-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.8rem;
                letter-spacing: 1px;
            }

            .page-title {
                font-size: 2rem;
                letter-spacing: 3px;
                margin: 1.5rem 0 2rem;
            }

            .init-info p {
                font-size: 1rem;
                margin-bottom: 15px;
            }

            .content {
                padding-top: 80px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 8px 10px;
            }

            .nav-btn {
                padding: 0.4rem 0.6rem;
                font-size: 0.65rem;
                letter-spacing: 0.5px;
            }

            .page-title {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }

            .init-info {
                padding: 0 15px;
            }

            .init-info p {
                font-size: 0.9rem;
                margin-bottom: 12px;
            }

            .content {
                padding-top: 70px;
            }
        }
    </style>
</head>
<body>
    <div id="space-container"></div>

    <header class="navbar">
        <button class="nav-btn" onclick="window.location.href='index.html'">← BACK</button>
    </header>

    <div class="content">
        <h1 class="page-title">INIT</h1>
        <div class="init-info">
            <p>System initialization complete.</p>
            <p>Ready to explore the cosmos of machine learning.</p>
            <p>Navigate through projects, datasets, and signals to discover.</p>
        </div>
    </div>

    <script>
        const spaceContainer = document.getElementById('space-container');
        const bgStarCount = 200;

        function createBgStars() {
            for (let i = 0; i < bgStarCount; i++) {
                const star = document.createElement('div');
                star.className = 'star-bg';
                const pos = { x: Math.random() * 100, y: Math.random() * 100 };
                const size = Math.random() * 1.5 + 0.3;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = pos.x + '%';
                star.style.top = pos.y + '%';
                star.style.animationDelay = (Math.random() * 2.5) + 's';
                spaceContainer.appendChild(star);
            }
        }

        function createAsteroids() {
            const asteroidCount = 6;
            for (let i = 0; i < asteroidCount; i++) {
                const asteroid = document.createElement('div');
                asteroid.className = 'asteroid';
                const size = Math.random() * 6 + 2;
                asteroid.style.width = size + 'px';
                asteroid.style.height = size + 'px';
                asteroid.style.left = Math.random() * 100 + '%';
                asteroid.style.top = Math.random() * 100 + '%';
                asteroid.style.background = '#b4b4c8';
                spaceContainer.appendChild(asteroid);
            }
        }

        createBgStars();
        createAsteroids();
    </script>
</body>
</html>
