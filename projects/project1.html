<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemical Encoder | Youssef Khaled</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-color: #0a0a1a;
            --text-color: #e0e0e8;
            --glow-soft: rgba(100, 150, 255, 0.4);
            --nav-bg: rgba(10, 10, 30, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            background: #000000;
            color: var(--text-color);
            font-family: 'VT323', monospace;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #space-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .star-bg {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.6;
            box-shadow: 0 0 6px rgba(200, 200, 255, 0.4);
            animation: twinkle 2.5s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        .asteroid {
            position: absolute;
            border-radius: 50%;
            opacity: 0.7;
            box-shadow: 0 0 8px rgba(180, 180, 200, 0.4);
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(100, 150, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 999;
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.15);
        }

        .nav-btn {
            background: transparent;
            border: 1px solid rgba(150, 180, 255, 0.5);
            color: #a8c5ff;
            padding: 0.7rem 1.4rem;
            font-size: 1rem;
            font-family: 'VT323', monospace;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(100, 150, 255, 0.2);
            text-shadow: 0 0 5px rgba(100, 150, 255, 0.3);
        }

        .nav-btn:hover {
            transform: scale(1.08);
            border-color: rgba(150, 180, 255, 0.8);
            color: #d0e0ff;
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.4);
            text-shadow: 0 0 8px rgba(100, 150, 255, 0.6);
        }

        /* CONTENT */
        .content {
            position: relative;
            z-index: 10;
            padding-top: 100px;
            padding-bottom: 50px;
        }

        .project-header {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px;
            text-align: center;
            border-bottom: 1px solid rgba(100, 150, 255, 0.3);
            margin-bottom: 40px;
        }

        .project-id {
            font-size: 0.9rem;
            color: #ffaa66;
            text-shadow: 0 0 5px rgba(255, 170, 102, 0.4);
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .project-title {
            font-size: 2.5rem;
            color: #e0e0e8;
            text-shadow: 0 0 30px rgba(100, 150, 255, 0.4);
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        .project-meta {
            font-size: 1rem;
            color: #b8c8e8;
            text-shadow: 0 0 15px rgba(100, 150, 255, 0.2);
        }

        .readme-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            background: rgba(15, 15, 35, 0.4);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 4px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .readme-content h2 {
            font-size: 1.8rem;
            color: #e0e0e8;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.3);
            margin-top: 30px;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .readme-content h3 {
            font-size: 1.3rem;
            color: #b8c8e8;
            text-shadow: 0 0 15px rgba(100, 150, 255, 0.2);
            margin-top: 20px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .readme-content p {
            font-size: 1rem;
            color: #a8c5ff;
            text-shadow: 0 0 10px rgba(100, 150, 255, 0.1);
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .readme-content code {
            background: rgba(100, 150, 255, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            color: #ffaa66;
        }

        .readme-content pre {
            background: rgba(100, 150, 255, 0.08);
            padding: 15px;
            border-left: 3px solid rgba(100, 150, 255, 0.4);
            margin: 15px 0;
            overflow-x: auto;
            font-size: 0.9rem;
        }

        .readme-content ul, .readme-content ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .readme-content li {
            margin-bottom: 8px;
            color: #a8c5ff;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            background: transparent;
            border: 1px solid rgba(150, 180, 255, 0.5);
            color: #a8c5ff;
            padding: 0.7rem 1.4rem;
            font-family: 'VT323', monospace;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .back-btn:hover {
            border-color: rgba(150, 180, 255, 0.8);
            color: #d0e0ff;
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.4);
        }
    </style>
</head>
<body>
    <div id="space-container"></div>

    <header class="navbar">
        <button class="nav-btn" onclick="window.location.href='../index.html'">BACK</button>
    </header>

    <div class="content">
        <div class="project-header">
            <div class="project-id">PROJECT_01</div>
            <h1 class="project-title">Chemical Encoder</h1>
            <p class="project-meta">Advanced chemical compound encoding using neural networks</p>
        </div>

        <div class="readme-container">
            <div class="readme-content" id="readmeContent"></div>
        </div>

        <div style="max-width: 900px; margin: 0 auto; padding: 0 20px; text-align: center;">
            <a href="../projects.html" class="back-btn">← Back to Projects</a>
        </div>
    </div>

    <script>
        const spaceContainer = document.getElementById('space-container');
        const bgStarCount = 200;

        function createBgStars() {
            for (let i = 0; i < bgStarCount; i++) {
                const star = document.createElement('div');
                star.className = 'star-bg';
                const pos = { x: Math.random() * 100, y: Math.random() * 100 };
                const size = Math.random() * 1.5 + 0.3;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = pos.x + '%';
                star.style.top = pos.y + '%';
                star.style.animationDelay = (Math.random() * 2.5) + 's';
                spaceContainer.appendChild(star);
            }
        }

        function createAsteroids() {
            const asteroidCount = 6;
            for (let i = 0; i < asteroidCount; i++) {
                const asteroid = document.createElement('div');
                asteroid.className = 'asteroid';
                const size = Math.random() * 6 + 2;
                asteroid.style.width = size + 'px';
                asteroid.style.height = size + 'px';
                asteroid.style.left = Math.random() * 100 + '%';
                asteroid.style.top = Math.random() * 100 + '%';
                asteroid.style.background = '#b4b4c8';
                spaceContainer.appendChild(asteroid);
            }
        }

        // Markdown-like content (يمكن استبدالها ب markdown parser)
        const readmeHTML = `
            <h2>Overview</h2>
            <p>The Chemical Encoder is a sophisticated machine learning model designed to transform chemical compound representations into meaningful embeddings using deep neural networks.</p>

            <h2>Features</h2>
            <ul>
                <li>Advanced molecular structure understanding</li>
                <li>Deep learning-based compound encoding</li>
                <li>High-dimensional embedding space</li>
                <li>Transfer learning capabilities</li>
            </ul>

            <h2>Technical Stack</h2>
            <p>Built with <code>PyTorch</code>, <code>RDKit</code>, and <code>NumPy</code> for maximum performance.</p>

            <h2>Architecture</h2>
            <pre>Input → Molecular Graph → GNN Encoder → Dense Layers → Embedding Output</pre>

            <h2>Usage Example</h2>
            <pre><code>from chemical_encoder import ChemicalEncoder

encoder = ChemicalEncoder(embedding_dim=256)
compound = "CCO"  # Ethanol SMILES
embedding = encoder.encode(compound)</code></pre>

            <h2>Performance</h2>
            <p>Achieves 94.2% accuracy on chemical property prediction tasks with optimized inference time.</p>

            <h2>Research Papers</h2>
            <ul>
                <li>Graph Neural Networks for Molecular Generation (2023)</li>
                <li>Deep Learning in Computational Chemistry (2022)</li>
            </ul>
        `;

        document.getElementById('readmeContent').innerHTML = readmeHTML;
        createBgStars();
        createAsteroids();
    </script>
</body>
</html>
